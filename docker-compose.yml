services:
  # ── Skyvern AI Browser Automation ──────────────────────────
  skyvern-postgres:
    image: postgres:14-alpine
    container_name: socialgrowthai-skyvern-db
    restart: always
    volumes:
      - skyvern-pgdata:/var/lib/postgresql/data
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_USER=skyvern
      - POSTGRES_PASSWORD=skyvern
      - POSTGRES_DB=skyvern
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyvern"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - social-network

  skyvern:
    image: public.ecr.aws/skyvern/skyvern:latest
    container_name: socialgrowthai-skyvern
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"   # Skyvern API
      - "6080:6080"   # Skyvern VNC
    volumes:
      - skyvern-artifacts:/data/artifacts
      - skyvern-videos:/data/videos
      - skyvern-har:/data/har
      - skyvern-log:/data/log
      - skyvern-config:/app/.skyvern
    env_file:
      - ./.env
    environment:
      - DATABASE_STRING=postgresql+psycopg://skyvern:skyvern@skyvern-postgres:5432/skyvern
      - BROWSER_STREAMING_MODE=cdp
      - BROWSER_TYPE=chromium-headful
      - ENABLE_CODE_BLOCK=true
      # LLM via Groq (best free tier for vision: 30 RPM, 14,400 RPD)
      - ENABLE_GROQ=true
      - LLM_KEY=GROQ
      - GROQ_API_KEY=${SKYVERN_LLM_GROQ_API_KEY:-${OPENROUTER_API_KEY:-}}
      - GROQ_MODEL=${SKYVERN_LLM_GROQ_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      # Cap LLM-driven steps to avoid free-tier 429s
      - MAX_STEPS_PER_RUN=2
      - MAX_RETRIES_PER_STEP=0
      - MAX_SCRAPING_RETRIES=0
      - MAX_SCREENSHOT_SCROLLS=2
      - PORT=8000
    depends_on:
      skyvern-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/api/v1/heartbeat || (python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/heartbeat', timeout=5)\") || (python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/heartbeat', timeout=5)\")"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s
    networks:
      - social-network

  skyvern-ui:
    image: public.ecr.aws/skyvern/skyvern-ui:latest
    container_name: socialgrowthai-skyvern-ui
    restart: on-failure
    ports:
      - "8080:8080"   # Skyvern UI
      - "9090:9090"   # Artifacts API
    volumes:
      - skyvern-artifacts:/data/artifacts
      - skyvern-videos:/data/videos
      - skyvern-har:/data/har
      - skyvern-config:/app/.skyvern
    environment:
      - VITE_BROWSER_STREAMING_MODE=cdp
      - VITE_API_BASE_URL=http://${HOST_IP:-153.75.247.117}:8000/api/v1
      - VITE_WSS_BASE_URL=ws://${HOST_IP:-153.75.247.117}:8000/api/v1
      - VITE_ARTIFACT_API_BASE_URL=http://${HOST_IP:-153.75.247.117}:9090
    depends_on:
      skyvern:
        condition: service_healthy
    networks:
      - social-network

  # ── VNC browser for OTP / CAPTCHA manual intervention ─────
  vnc-social:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: socialgrowthai-vnc-social
    command: ["node", "vnc_social.mjs"]
    ports:
      - "6100:6100"
      - "6082:6082"
    volumes:
      - cookies:/app/cookies
    environment:
      - VNC_PORT=5901
      - NOVNC_PORT=6082
    networks:
      - social-network
    restart: always

  # ── Python backend ────────────────────────────────────────
  python-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: socialgrowthai-python-backend
    ports:
      - "${PORT:-8010}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - data:/app/data
      - cookies:/app/cookies
      - scratch:/app/scratch
      - uploads:/app/uploads
      - ./.env:/app/.env
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=sqlite:///data/social_growth.db
      - SKYVERN_API_URL=http://skyvern:8000
      # Multi-provider LLM config (read by ProviderManager)
      - SKYVERN_LLM_PROVIDERS=${SKYVERN_LLM_PROVIDERS:-Groq,OpenRouter,Google}
      - SKYVERN_LLM_GROQ_API_KEY=${SKYVERN_LLM_GROQ_API_KEY:-}
      - SKYVERN_LLM_GROQ_MODEL=${SKYVERN_LLM_GROQ_MODEL:-llama-4-scout-17b-16e-instruct}
      - SKYVERN_LLM_GROQ_BASE_URL=${SKYVERN_LLM_GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      - SKYVERN_LLM_GROQ_RPM_LIMIT=${SKYVERN_LLM_GROQ_RPM_LIMIT:-30}
      - SKYVERN_LLM_OPENROUTER_API_KEY=${SKYVERN_LLM_OPENROUTER_API_KEY:-}
      - SKYVERN_LLM_OPENROUTER_MODEL=${SKYVERN_LLM_OPENROUTER_MODEL:-meta-llama/llama-4-scout:free}
      - SKYVERN_LLM_OPENROUTER_BASE_URL=${SKYVERN_LLM_OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - SKYVERN_LLM_OPENROUTER_RPM_LIMIT=${SKYVERN_LLM_OPENROUTER_RPM_LIMIT:-20}
      - SKYVERN_LLM_GOOGLE_API_KEY=${SKYVERN_LLM_GOOGLE_API_KEY:-}
      - SKYVERN_LLM_GOOGLE_MODEL=${SKYVERN_LLM_GOOGLE_MODEL:-gemini-2.5-flash}
      - SKYVERN_LLM_GOOGLE_BASE_URL=${SKYVERN_LLM_GOOGLE_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      - SKYVERN_LLM_GOOGLE_RPM_LIMIT=${SKYVERN_LLM_GOOGLE_RPM_LIMIT:-10}
      - SKYVERN_LLM_SAMBANOVA_API_KEY=${SKYVERN_LLM_SAMBANOVA_API_KEY:-}
      - SKYVERN_LLM_SAMBANOVA_MODEL=${SKYVERN_LLM_SAMBANOVA_MODEL:-Meta-Llama-4-Scout-17B-16E-Instruct}
      - SKYVERN_LLM_SAMBANOVA_BASE_URL=${SKYVERN_LLM_SAMBANOVA_BASE_URL:-https://api.sambanova.ai/v1}
      - SKYVERN_LLM_SAMBANOVA_RPM_LIMIT=${SKYVERN_LLM_SAMBANOVA_RPM_LIMIT:-30}
      - SKYVERN_LLM_NVIDIA_API_KEY=${SKYVERN_LLM_NVIDIA_API_KEY:-}
      - SKYVERN_LLM_NVIDIA_MODEL=${SKYVERN_LLM_NVIDIA_MODEL:-meta/llama-4-scout-17b-16e-instruct}
      - SKYVERN_LLM_NVIDIA_BASE_URL=${SKYVERN_LLM_NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - SKYVERN_LLM_NVIDIA_RPM_LIMIT=${SKYVERN_LLM_NVIDIA_RPM_LIMIT:-40}
    networks:
      - social-network
    restart: always

  # ── Next.js frontend ─────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8010}
    container_name: socialgrowthai-frontend
    ports:
      - "80:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8010}
    depends_on:
      - python-backend
    networks:
      - social-network
    restart: always

networks:
  social-network:
    driver: bridge

volumes:
  data:
  cookies:
  scratch:
  uploads:
  skyvern-pgdata:
  skyvern-artifacts:
  skyvern-videos:
  skyvern-har:
  skyvern-log:
  skyvern-config:
