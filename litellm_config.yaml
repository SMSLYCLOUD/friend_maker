model_list:
  # ── Primary: DeepSeek (fast, cheap, high RPM) ──
  - model_name: skyvern-llm
    litellm_params:
      model: openai/deepseek-chat
      api_key: "os.environ/DEEPSEEK_API_KEY"
      api_base: https://api.deepseek.com/v1
      timeout: 30
      rpm: 2500
    model_info:
      id: deepseek-primary

  # ── Fallback 1: Xiaomi MiMo V2.5 (direct, cheap, vision) ──
  - model_name: skyvern-llm
    litellm_params:
      model: openai/mimo-v2.5
      api_key: "os.environ/XIAOMI_MIMO_API_KEY"
      api_base: https://api.xiaomimimo.com/v1
      timeout: 15
      rpm: 30
    model_info:
      id: xiaomi-fallback

  # ── Fallback 2: Groq (fast, free tier) ──
  - model_name: skyvern-llm
    litellm_params:
      model: groq/meta-llama/llama-4-scout-17b-16e-instruct
      api_key: "os.environ/GROQ_API_KEY"
      timeout: 15
      rpm: 30
    model_info:
      id: groq-fallback

  # ── Fallback 3: OpenRouter (Google Gemini Flash - paid, vision) ──
  - model_name: skyvern-llm
    litellm_params:
      model: openrouter/google/gemini-3.5-flash
      api_key: "os.environ/OPENROUTER_API_KEY"
      timeout: 15
      rpm: 30
    model_info:
      id: openrouter-fallback

  # ── Fallback 3: Google Gemini (free tier, vision) ──
  - model_name: skyvern-llm
    litellm_params:
      model: gemini/gemini-3.5-flash
      api_key: "os.environ/GEMINI_API_KEY"
      timeout: 15
      rpm: 10
    model_info:
      id: google-fallback

  # ── Fallback 4: SambaNova (free tier) ──
  - model_name: skyvern-llm
    litellm_params:
      model: sambanova/Llama-4-Maverick-17B-128E-Instruct
      api_key: "os.environ/SAMBANOVA_API_KEY"
      timeout: 15
      rpm: 30
    model_info:
      id: sambanova-fallback

  # ── Fallback 5: NVIDIA NIM (free tier) ──
  - model_name: skyvern-llm
    litellm_params:
      model: openai/meta/llama-4-maverick-17b-128e-instruct
      api_key: "os.environ/NVIDIA_API_KEY"
      api_base: https://integrate.api.nvidia.com/v1
      timeout: 15
      rpm: 40
    model_info:
      id: nvidia-fallback

litellm_settings:
  num_retries: 1
  request_timeout: 15
  fallbacks:
    - skyvern-llm: [deepseek-primary, xiaomi-fallback, groq-fallback, openrouter-fallback, google-fallback, sambanova-fallback, nvidia-fallback]
  cooldown_time: 30
  allowed_fails: 2
