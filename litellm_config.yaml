model_list:
  # ── Primary: Groq (fast, free tier) ──
  - model_name: skyvern-llm
    litellm_params:
      model: groq/meta-llama/llama-4-scout-17b-16e-instruct
      api_key: "os.environ/GROQ_API_KEY"
      rpm: 30
    model_info:
      id: groq-primary

  # ── Fallback 1: OpenRouter (free tier) ──
  - model_name: skyvern-llm
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct:free
      api_key: "os.environ/OPENROUTER_API_KEY"
      rpm: 20
    model_info:
      id: openrouter-fallback

  # ── Fallback 2: Google Gemini (free tier) ──
  - model_name: skyvern-llm
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: "os.environ/GEMINI_API_KEY"
      rpm: 10
    model_info:
      id: google-fallback

litellm_settings:
  num_retries: 2
  request_timeout: 60
  fallbacks:
    - skyvern-llm: [openrouter-fallback, google-fallback]
  cooldown_time: 30
  allowed_fails: 2
