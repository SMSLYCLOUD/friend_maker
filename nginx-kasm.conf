load_module modules/ngx_stream_module.so;

worker_processes 1;
pid /tmp/nginx.pid;
error_log /tmp/nginx_error.log warn;

events {
    worker_connections 1024;
}

# ── TCP-level traffic demux on port 6901 ──────────────────
# ssl_preread peeks at the first bytes:
#   TLS ClientHello  → proxy to KasmVNC (HTTPS on 6903)
#   Plain HTTP GET   → proxy to redirect server (HTTP on 6904)
stream {
    ssl_preread on;

    map $ssl_preread_protocol $backend {
        ""        redirect_backend;
        default   kasmvnc_backend;
    }

    upstream kasmvnc_backend {
        server 127.0.0.1:6903;
    }

    upstream redirect_backend {
        server 127.0.0.1:6904;
    }

    server {
        listen 6901;
        proxy_pass $backend;
        proxy_connect_timeout 10s;
        proxy_timeout 3600s;
    }
}

# ── HTTP redirect for plain-HTTP visitors ────────────────
http {
    client_body_temp_path /tmp/nginx_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;
    uwsgi_temp_path /tmp/nginx_uwsgi;
    scgi_temp_path /tmp/nginx_scgi;

    server {
        listen 6904;
        return 301 https://$host:6901$request_uri;
    }
}
