services:
  python-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: socialgrowthai-python-backend
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///data/social_growth.db
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
      - FRONTEND_URL=http://localhost:3000
      - REDIRECT_ROOT_TO_FRONTEND=true

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: socialgrowthai-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - python-backend

  android-emulator:
    image: budtmo/docker-android:emulator_13.0
    container_name: socialgrowthai-android
    privileged: true
    ports:
      - "6080:6080"
      - "5554:5554"
      - "5555:5555"
      - "4723:4723"
    environment:
      - DEVICE=Samsung Galaxy S10
      - APPIUM=true
    volumes:
      - ./data/android:/root
