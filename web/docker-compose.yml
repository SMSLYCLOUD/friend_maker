services:
  python-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: socialgrowthai-python-backend
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///data/social_growth.db
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
